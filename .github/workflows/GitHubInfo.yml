name: GitHub Stats Update

on:
  schedule:
    - cron: "0 0,12 * * *"
  
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'README.md'

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate GitHub Stats Card
        run: |
          curl -L "https://github-readme-stats.vercel.app/api?username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight&hide_border=true&bg_color=0d1117&title_color=F7B93E&icon_color=F7B93E&text_color=ffffff" > stats.svg
          curl -L "https://github-readme-stats.vercel.app/api/top-langs/?username=${{ github.repository_owner }}&layout=compact&theme=tokyonight&hide_border=true&bg_color=0d1117&title_color=F7B93E&text_color=ffffff" > top-langs.svg
          curl -L "https://github-readme-stats.vercel.app/api?username=${{ github.repository_owner }}&show_icons=true&theme=default&hide_border=true" > stats-light.svg
          curl -L "https://github-readme-stats.vercel.app/api/top-langs/?username=${{ github.repository_owner }}&layout=compact&theme=default&hide_border=true" > top-langs-light.svg

      - name: Create stats directory
        run: |
          mkdir -p assets/stats

      - name: Move stats files
        run: |
          mv stats.svg assets/stats/
          mv top-langs.svg assets/stats/
          mv stats-light.svg assets/stats/
          mv top-langs-light.svg assets/stats/

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add assets/stats/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update github stats [skip ci]"
          git push
